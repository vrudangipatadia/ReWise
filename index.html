<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReWise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="auth-box" class="auth-container">
        <div class="glass-card">
            <h2 class="welcome-text">Welcome to ReWise</h2>
            <div id="login-form">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="main-btn login-spacing" onclick="login()">Login</button>
                <p class="auth-footer">New? <span class="link" onclick="toggleAuth()">Register</span></p>
            </div>
            <div id="reg-form" style="display:none;">
                <input type="text" id="r-user" placeholder="Choose Username">
                <input type="password" id="r-pass" placeholder="Choose Password">
                <button class="main-btn login-spacing" onclick="register()">Create Account</button>
                <p class="auth-footer">Back to <span class="link" onclick="toggleAuth()">Login</span></p>
            </div>
        </div>
    </div>

   <main id="main-app" class="app-container" style="display:none;">
    <header class="header">
        <div class="user-profile" onclick="toggleLogoutMenu()" style="cursor: pointer;">
          <div id="user-initial" class="user-initial">?</div>
            <div id="logout-menu" class="logout-dropdown hidden">
        <p id="full-username"></p>
        <button onclick="logout()">Logout</button>
    </div>
</div>

        <div class="brand">
            <h1>Re<span>Wise</span></h1>
            <p>Learning with Flashcards</p>
        </div>

        <div style="width: 40px;"></div> 
    </header>
        

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Search cards..." oninput="filterCards()">
        </div>

        <div class="mode-selector">
            <button id="btn-s" class="mode-btn" onclick="setView('study')">Practice mode</button>
            <button id="btn-c" class="mode-btn active" onclick="setView('create')">Create Mode</button>
        </div>

        <section id="view-study" class="hidden">
            <div class="grid" id="card-grid"></div>
        </section>

        <section id="view-create">
            <div class="create-bar">
                <input id="in-q" placeholder="Question">
                <input id="in-a" placeholder="Answer">
                <select id="in-c">
                    <option value="green">Green</option>
                    <option value="pink">Pink</option>
                    <option value="red">Red</option>
                    <option value="purple">Purple</option>
                    <option value="blue">Blue</option>
                    <option value="yellow">Yellow</option>
                </select>
                <input id="in-t" placeholder="Tag (optional)"> 
                <button class="add-btn" onclick="addCard()">+ Add Card</button>
            </div>
            <hr class="divider">
            <div id="card-list" class="list-view"></div>
        </section>
    </main>

    <div id="edit-modal" class="modal-overlay hidden">
        <div class="edit-window">
            <h3>Edit Card</h3>
            <div class="modal-body">
                <label>Question</label>
                <input type="text" id="edit-q">
                <label>Answer</label>
                <input type="text" id="edit-a">
                <label>Tag</label>
                <input type="text" id="edit-t">
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeModal('edit-modal')">Cancel</button>
                <button class="save-btn" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay hidden">
        <div class="edit-window delete-prompt">
            <h3>Delete Card?</h3>
            <p>Are you sure you want to delete this card? This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeModal('delete-modal')">Cancel</button>
                <button class="confirm-del-btn" onclick="confirmDelete()">Delete Card</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
