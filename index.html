<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Flashcard Learning App</title>
  <link rel="stylesheet" href="style.css" />

  <!-- icons libarary -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="container">
  <div class="header">
    <div>
      <h1>GradientLearn : Flashcard Learning App</h1>
      <p>Colorful cards that boost your learning</p>
    </div>


    <div class="counter">
      <span class="dot"></span>
      <span id="count">0 cards</span>
    </div>
  </div>

  <!-- input of flashcards -->
  <div class="input-card">
    <input id="question" placeholder="Question" />
    <input id="answer" placeholder="Answer" />

    <!-- Dropdown of color options -->
    <select id="color">
      <option value="emerald">Emerald</option>
      <option value="pink">Pink</option>
      <option value="orange">Orange</option>
      <option value="purple">Purple</option>
    </select>
    <input id="tag" placeholder="Tag (optional)" />
    <button onclick="addCard()">+ Add Card</button>
  </div>

  <div class="grid" id="grid"></div>

</div>

<!--edit popup -->
<div id="editModal" class="modal-overlay">
  <div class="modal">

    <div class="modal-header">
      <div>
        <h2>Edit Flashcard</h2>
        <p>Update the question, answer, color, and tag for this flashcard.</p>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
   
    <!-- shows the edit fields with existing inputs at start -->
    <div class="modal-body">
      <label>Question</label>
      <input id="edit-question" type="text" />
     
      <label>Answer</label>
      <input id="edit-answer" type="text" />
     
      <label>Color</label>
      <select id="edit-color">
        <option value="emerald">Emerald</option>
        <option value="pink">Pink</option>
        <option value="orange">Orange</option>
        <option value="purple">Purple</option>
      </select>
     
      <label>Tag (optional)</label>
      <input id="edit-tag" type="text" />
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>

      <!-- Saves chnages of the seleetcted flashcard -->
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
